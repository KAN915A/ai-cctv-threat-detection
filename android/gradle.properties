# jdk.net.unixdomain.tmpdir: this dev machine's default TMP breaks JDK AF_UNIX
# sockets (selector "Unable to establish loopback connection"); harmless elsewhere
# on Windows, remove on non-Windows machines.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8 -Djdk.net.unixdomain.tmpdir=C:\\Temp
kotlin.daemon.jvmargs=-Xmx1536m -Djdk.net.unixdomain.tmpdir=C:\\Temp
android.useAndroidX=true
android.nonTransitiveRClass=true
org.gradle.parallel=true
org.gradle.caching=true
